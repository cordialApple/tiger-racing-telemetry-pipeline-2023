services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: tiger-telemetry-timescaledb
    environment:
      POSTGRES_USER: fsae
      POSTGRES_PASSWORD: fsae2023
      POSTGRES_DB: telemetry
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fsae -d telemetry"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  timescale_data:
